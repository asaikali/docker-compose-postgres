volumes:
  postgres:
  pgadmin:

configs:
  postgres_init:
    content: |
      CREATE DATABASE demo2;
  pgadmin_servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "Docker Compose",
            "Group": "Servers",
            "Port": 5432,
            "Username": "postgres",
            "Host": "postgres",
            "SSLMode": "prefer",
            "MaintenanceDB": "postgres",
            "PassFile": "/tmp/pgpassfile"
          }
        }
      }

services:
  postgres:
    labels:
      # see https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#features.docker-compose.custom-images for details
      org.springframework.boot.service-connection: postgres
    image: "postgres:18"
    # Docker defaults to 64mb /dev/shm which can cause "No space left on device" errors.
    # PostgreSQL uses shared memory for shared_buffers (default 128mb), locks, and parallel queries.
    # 256mb provides headroom beyond the default shared_buffers without pre-allocating RAM (tmpfs
    # only consumes physical memory for data actually written).
    shm_size: 256mb
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "demo1"
      PGDATA: "/data/postgres"
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/docker_postgres_init.sql
    volumes:
      - postgres:/data/postgres
    ports:
      - "${PG_PORT:-15432}:5432"
    restart: unless-stopped

  pgadmin:
    labels:
      org.springframework.boot.ignore: true
    image: "dpage/pgadmin4:9.13"
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@example.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    configs:
      - source: pgadmin_servers
        target: /pgadmin4/servers.json
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-15433}:80"
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "/bin/echo 'postgres:5432:*:postgres:password' > /tmp/pgpassfile && chmod 600 /tmp/pgpassfile && /entrypoint.sh"
    restart: unless-stopped
